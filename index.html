<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Stock Manager — Gestión de inventario de piezas de celulares con escaneo rápido">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Stock Manager</title>
  <style id="critical-styles">
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #06b6d4;
      --radius-md: 10px;
      --sp-3: 12px;
      --sp-4: 16px;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-display);
      margin: 0;
      overflow-x: hidden;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      background: var(--bg-secondary);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .accent {
      color: var(--accent);
    }

    .view-container {
      flex: 1;
      padding: var(--sp-4);
      padding-bottom: 120px;
    }
  </style>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

</head>

<body>
  <div id="app">
    <header class="app-header">
      <div class="header-title">
        <svg class="header-logo" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor"
          stroke-width="2">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
          <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
          <line x1="12" y1="22.08" x2="12" y2="12" />
        </svg>
        <h1>Stock<span class="accent">Mgr</span></h1>
      </div>
      <div class="header-status" id="connectionStatus">
        <span class="status-dot status-dot--online"></span>
        <span class="status-label">Online</span>
      </div>
    </header>

    <main id="viewContainer" class="view-container"></main>

    <!-- Scanner Overlay -->
    <div id="scanOverlay" class="scan-overlay hidden">
      <div class="scan-overlay__header">
        <h2>Escaneo Rápido</h2>
        <button id="closeScan" class="btn-icon" aria-label="Cerrar escáner">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="scannerView" class="scan-overlay__camera"></div>
      <div id="scanResult" class="scan-overlay__result hidden">
        <div class="scan-result__info">
          <h3 id="scanProductName">—</h3>
          <p id="scanProductSKU" class="sku-mono">—</p>
          <div class="scan-result__stock">
            <span>Stock actual:</span>
            <span id="scanProductStock" class="stock-number">0</span>
          </div>
        </div>
        <div class="scan-result__actions">
          <button id="btnEntrada" class="btn-action btn-action--entrada">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>ENTRADA</span>
          </button>
          <button id="btnSalida" class="btn-action btn-action--salida">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>SALIDA</span>
          </button>
        </div>
      </div>
    </div>

    <!-- FAB Scan Button -->
    <button id="fabScan" class="fab-scan" aria-label="Escanear código">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
        <circle cx="12" cy="13" r="4" />
      </svg>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="#/" class="bottom-nav__item" data-route="/">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Inicio</span>
      </a>
      <a href="#/inventario" class="bottom-nav__item" data-route="/inventario">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>
        <span>Stock</span>
      </a>
      <div class="bottom-nav__spacer"></div>
      <a href="#/agregar" class="bottom-nav__item" data-route="/agregar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        <span>Agregar</span>
      </a>
      <a href="#/marcas" class="bottom-nav__item" data-route="/marcas">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
          <line x1="7" y1="7" x2="7.01" y2="7" />
        </svg>
        <span>Marcas</span>
      </a>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
