name: Quality and Security Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Security Scan (vulnerability-scanner)
        # Aquí es donde el agente de seguridad entraría en acción
        # Por ahora simulamos el check de seguridad básica
        run: npm audit --audit-level=high
        
      - name: Lint and Format Check (Biome)
        # Verificamos que el código cumpla con los estándares de Biome
        run: npx @biomejs/biome ci .
        continue-on-error: true # No bloqueamos al principio mientras migramos
        
      - name: Run Tests (Vitest)
        run: npm test
        continue-on-error: true # Ídem, hasta tener los tests de Vue listos
